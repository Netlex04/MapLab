[package]
name = "ecu-parser"
version = "0.1.0"
edition = "2021"
description = "Browser-side ECU binary parser compiled to WebAssembly"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"
serde = { version = "1.0", features = ["derive"] }
serde-wasm-bindgen = "0.6"
js-sys = "0.3"
sha2 = "0.10"
hex = "0.4"

[profile.release]
# Optimize for binary size – every byte counts in a WASM download
opt-level = "s"
lto = true
